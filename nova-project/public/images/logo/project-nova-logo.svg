<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Project Nova Logo -->
  <defs>
    <linearGradient id="novaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="novaGradientText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#novaGradient)" opacity="0.15"/>

  <!-- Sparkles Icon -->
  <g transform="translate(176, 176)">
    <path d="M80 0 L90 35 L125 35 L95 55 L105 90 L80 70 L55 90 L65 55 L35 35 L70 35 Z"
          fill="url(#novaGradient)" opacity="0.9"/>
    <path d="M200 50 L205 65 L220 65 L210 75 L215 90 L200 80 L185 90 L190 75 L180 65 L195 65 Z"
          fill="url(#novaGradient)" opacity="0.7" transform="scale(0.6) translate(80, 40)"/>
    <path d="M100 180 L105 195 L120 195 L110 205 L115 220 L100 210 L85 220 L90 205 L80 195 L95 195 Z"
          fill="url(#novaGradient)" opacity="0.5" transform="scale(0.4) translate(160, 120)"/>
  </g>

  <!-- Text "NOVA" -->
  <text x="256" y="380" font-family="system-ui, sans-serif" font-weight="800" font-size="72"
        fill="url(#novaGradientText)" text-anchor="middle" letter-spacing="8">NOVA</text>

  <!-- Subtext -->
  <text x="256" y="420" font-family="system-ui, sans-serif" font-weight="400" font-size="18"
        fill="#64748B" text-anchor="middle">PROJECT</text>
</svg>